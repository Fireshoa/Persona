<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERSONA | Multi-Model Roleplay</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center p-4 w-full">

    <header class="w-full max-w-full flex justify-between items-center mb-8 border-b border-gray-700 pb-4 px-2">
        <div class="flex flex-col">
            <h1 class="text-xl font-bold tracking-widest uppercase">Persona</h1>
            <span id="model-stats" class="text-[10px] text-gray-500 font-mono">Select a model to see limits</span>
        </div>
        <div class="flex gap-2">
            <button onclick="exportChat()"
                class="text-xs bg-indigo-700 hover:bg-indigo-600 px-3 py-1 rounded transition-colors">Export
                JSON</button>
            <label class="text-xs bg-orange-700 hover:bg-orange-600 px-3 py-1 rounded cursor-pointer">
                Import JSON <input type="file" id="import-file" class="hidden" accept=".json"
                    onchange="importChat(event)">
            </label>
            <button onclick="clearChat()" class="text-xs bg-red-900 hover:bg-red-800 px-3 py-1 rounded">Clear</button>
            <button onclick="manageKey()" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded">Key</button>
        </div>
    </header>

    <main id="chat-window"
        class="w-full max-w-full h-[55vh] overflow-y-auto mb-6 space-y-4 p-6 bg-gray-800 rounded-lg shadow-2xl border border-gray-700 scroll-smooth">
        <div class="text-gray-400 italic text-center">Send a message below to get started</div>
    </main>

    <div class="w-full max-w-full space-y-3 px-2">
        <div class="flex gap-3">
            <div class="flex flex-col gap-2 flex-1">
                <textarea id="user-input" placeholder="Type a message... (Shift+Enter for new line)"
                    class="w-full bg-gray-800 border border-gray-700 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-white resize-none h-12 min-h-[48px] max-h-48 transition-all"
                    rows="1"></textarea>
            </div>
            <button id="send-btn"
                class="bg-blue-600 hover:bg-blue-700 px-8 py-2 rounded-xl font-bold transition-all">Send</button>
        </div>

        <div class="flex flex-wrap gap-3 items-center">
            <select id="model-select" onchange="updateModelStats()"
                class="bg-gray-800 border border-gray-700 p-2 text-sm rounded-xl text-white focus:ring-2 focus:ring-blue-500">
                <option value="llama-3.1-8b-instant" data-tpm="6,000" data-rpm="30">Llama 3.1 8B (Fast)</option>
                <option value="meta-llama/llama-4-scout-17b-16e-instruct" data-tpm="30,000" data-rpm="50">Llama 4 Scout
                    (30k TPM)</option>
                <option value="llama-3.3-70b-versatile" data-tpm="6,000" data-rpm="30">Llama 3.3 70B (Smarter)</option>
            </select>

            <input id="prompt" type="text" placeholder="System prompt..."
                class="flex-1 bg-gray-800 border border-gray-700 p-2 rounded-xl text-sm focus:ring-2 focus:ring-emerald-500 text-white">

            <select id="preset-dropdown" onchange="applyPreset()"
                class="bg-gray-800 border border-gray-700 p-2 text-sm rounded-xl text-white focus:ring-2 focus:ring-blue-500">
                <option value="" selected disabled>Presets...</option>

                <option
                    value="You are the fearsome captain of a pirate ship, and the user is your new recruit.">
                    Pirate Roleplay</option>
            </select>

            <div class="flex items-center gap-2 bg-gray-800 border border-gray-700 p-2 rounded-xl">
                <label class="text-[10px] uppercase font-bold text-gray-400 px-1">Memory</label>
                <input id="memory-depth" type="number" value="10" min="1" max="50"
                    class="w-12 bg-gray-700 border-none text-center text-sm rounded">
            </div>

            <button onclick="updateSystem()"
                class="bg-emerald-700 hover:bg-emerald-600 px-6 py-2 rounded-xl font-bold text-sm">Update</button>
        </div>
    </div>

    <script type="module">
        import { Groq } from "https://esm.sh/groq-sdk";

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const systemInput = document.getElementById('prompt');
        const memoryInput = document.getElementById('memory-depth');
        const modelSelect = document.getElementById('model-select');
        const statsDisplay = document.getElementById('model-stats');

        let sPrompt = ""; // Global variable to hold the fetched text

        // 1. Function to fetch the external prompt file
        async function loadExternalPrompt() {
            try {
                const response = await fetch('prompt.txt');
                if (!response.ok) throw new Error("Could not find prompt.txt");
                sPrompt = await response.text();
                console.log("External prompt loaded.");

                // Update the initial message once the file is ready
                messages[0].content = generateSysPrompt(systemInput.value);
            } catch (err) {
                console.error("Error loading prompt.txt:", err);
                sPrompt = "you must decide if it is NSFW, and if so, refuse to respond to messages."; // Fallback
            }
        }

        // 2. Updated function to use the fetched string
        function generateSysPrompt(promptText) {
            return `This is your prompt: '${promptText}', ${sPrompt}`;
        }

        // Call the loader at the end of your script (or during init)
        loadExternalPrompt();

        const savedPrompt = localStorage.getItem("prompt") || "";
        systemInput.value = savedPrompt;
        let messages = [{ "role": "system", "content": generateSysPrompt(savedPrompt) }];

        // Display Stats for the selected model
        modelSelect.selectedIndex = localStorage.getItem("selectedModel")
        if (!modelSelect.selectedIndex) {
            modelSelect.selectedIndex = 0
        }
        window.updateModelStats = () => {
            const selected = modelSelect.options[modelSelect.selectedIndex];
            statsDisplay.innerText = `MODEL: ${selected.value} | LIMITS: ${selected.dataset.tpm} TPM, ${selected.dataset.rpm} RPM`;
            localStorage.setItem("selectedModel", modelSelect.selectedIndex)
        };
        updateModelStats();

        window.updateSystem = () => {
            const newPrompt = systemInput.value.trim();
            messages[0].content = generateSysPrompt(newPrompt);
            messages = [messages[0]];
            chatWindow.innerHTML = '<div class="text-yellow-500 text-xs italic text-center py-2">Persona Updated. History Wiped.</div>';
            localStorage.setItem("prompt", newPrompt);
        };

        window.exportChat = () => {
            const blob = new Blob([JSON.stringify(messages, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `persona-roleplay-${Date.now()}.json`;
            a.click();
        };

        window.importChat = (event) => {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                messages = JSON.parse(e.target.result);
                renderAllMessages();
            };
            reader.readAsText(file);
        };

        function renderAllMessages() {
            chatWindow.innerHTML = '';
            messages.forEach((msg, actualIndex) => { 
                if (msg.role !== 'system') appendMessage(msg.role, msg.content, actualIndex); 
            });
        }

        window.clearChat = () => {
            messages = [messages[0]];
            chatWindow.innerHTML = '<div class="text-gray-400 italic text-center">History cleared.</div>';
        };

        window.manageKey = () => {
            const key = prompt("Enter Groq API Key:");
            if (key) { localStorage.setItem('groq_api_key', key); location.reload(); }
        };

        const apiKey = localStorage.getItem('groq_api_key');
        if (!apiKey) { alert("API key required."); manageKey(); }
        const groq = new Groq({ apiKey, dangerouslyAllowBrowser: true });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !apiKey) return;

            messages.push({ role: "user", content: text });
            appendMessage('user', text, messages.length - 1);
            userInput.value = '';
            const responseDiv = appendMessage('assistant', '...', messages.length);
            let fullAIResponse = "";

            try {
                const depth = parseInt(memoryInput.value) || 10;
                const contextToSend = [messages[0], ...messages.slice(-depth)];

                const stream = await groq.chat.completions.create({
                    messages: contextToSend,
                    model: modelSelect.value,
                    stream: true,
                });

                responseDiv.innerText = "";
                for await (const chunk of stream) {
                    const content = chunk.choices[0]?.delta?.content || "";
                    fullAIResponse += content;
                    responseDiv.innerText += content;
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }
                messages.push({ role: "assistant", content: fullAIResponse });

            } catch (err) {
                responseDiv.innerText = "Error: " + err.message;
            }
        }

        function appendMessage(role, text, index) {
            const div = document.createElement('div');
            div.id = `msg-${index}`;
            div.className = role === 'user' ? "flex justify-end w-full" : "flex justify-start w-full";
            const span = document.createElement('span');
            span.className = `inline-block p-4 rounded-2xl max-w-[80%] ${role === 'user' ? "bg-blue-700 text-white rounded-tr-none shadow-lg" : "bg-gray-700 text-gray-100 rounded-tl-none shadow-md"}`;
            span.innerText = text;
            div.appendChild(span);

            // Add buttons
            const buttonDiv = document.createElement('div');
            // Use items-center to keep buttons from stretching vertically
            buttonDiv.className = 'flex gap-1 mt-1 justify-end items-top';

            if (role === 'assistant') {
                const editBtn = document.createElement('button');
                editBtn.innerText = '✏️';
                // Added w-7 h-7 (square size) and flex/items-center/justify-center
                editBtn.className = 'w-7 h-7 flex items-center justify-center text-xs bg-gray-600 hover:bg-yellow-500 rounded opacity-50 hover:opacity-100 transition-opacity';
                editBtn.title = 'Edit response';
                editBtn.onclick = () => editMessage(index);
                buttonDiv.appendChild(editBtn);
            }

            const deleteBtn = document.createElement('button');
            deleteBtn.innerText = '🗑️';
            // Added w-7 h-7 (square size) and flex/items-center/justify-center
            deleteBtn.className = 'w-7 h-7 flex items-center justify-center text-xs bg-gray-600 hover:bg-red-500 rounded opacity-50 hover:opacity-100 transition-opacity';
            deleteBtn.title = 'Delete message';
            deleteBtn.onclick = () => deleteMessage(index);
            buttonDiv.appendChild(deleteBtn);

            div.appendChild(buttonDiv);
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return span;
        }

        window.deleteMessage = (index) => {
            if (confirm('Are you sure you want to delete this message?')) {
                messages.splice(index, 1);
                renderAllMessages();
            }
        };

        window.editMessage = (index) => {
            const div = document.getElementById(`msg-${index}`);
            const span = div.querySelector('span');
            span.style.display = 'none';

            const textarea = document.createElement('textarea');
            textarea.value = messages[index].content;
            textarea.className = 'w-full bg-gray-700 border border-gray-600 p-2 rounded text-white resize-none';
            textarea.rows = 4;

            const buttonDiv = document.createElement('div');
            buttonDiv.className = 'flex gap-2 mt-2 justify-end';

            const saveBtn = document.createElement('button');
            saveBtn.innerText = 'Save';
            saveBtn.className = 'text-xs bg-green-600 hover:bg-green-500 px-3 py-1 rounded';
            saveBtn.onclick = () => {
                messages[index].content = textarea.value.trim();
                renderAllMessages();
            };

            const cancelBtn = document.createElement('button');
            cancelBtn.innerText = 'Cancel';
            cancelBtn.className = 'text-xs bg-gray-600 hover:bg-gray-500 px-3 py-1 rounded';
            cancelBtn.onclick = () => renderAllMessages();

            buttonDiv.appendChild(saveBtn);
            buttonDiv.appendChild(cancelBtn);

            div.appendChild(textarea);
            div.appendChild(buttonDiv);
        };

        window.applyPreset = () => {
            const dropdown = document.getElementById('preset-dropdown');
            const systemInput = document.getElementById('prompt');
            
            if (dropdown.value) {
                // 1. Fill the text input with the option value
                systemInput.value = dropdown.value;
                
                // 2. Trigger the existing updateSystem logic to lock it in
                window.updateSystem();
                
                console.log("Preset Applied:", dropdown.options[dropdown.selectedIndex].text);
            }
        };
        
        sendBtn.addEventListener('click', sendMessage);
        // Function to auto-resize the textarea as you type
        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        userInput.addEventListener('keypress', (e) => {
            // If Enter is pressed WITHOUT Shift, send the message
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); // Prevents a new line from being added
                sendMessage();
                // Reset height after sending
                userInput.style.height = 'auto';
            }
        });
        systemInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') window.updateSystem(); });
    </script>
</body>

</html>
